name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Anchor Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            anchor-cli --tag v0.29.0 --locked
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Install Node dependencies
        run: |
          yarn install
          cd sdk && yarn install && cd ..

      - name: Generate test wallet
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json
          solana config set --url localnet

      - name: Build program
        run: anchor build

      - name: Lint (Clippy)
        run: cargo clippy --manifest-path programs/emblem-bet/Cargo.toml -- -D warnings

      - name: Run tests (localnet)
        run: anchor test --skip-deploy
        env:
          ANCHOR_PROVIDER_URL: http://localhost:8899
          ANCHOR_WALLET: /home/runner/.config/solana/id.json

      - name: Upload IDL artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: emblem-bet-idl
          path: target/idl/emblem_bet.json
          retention-days: 30

      - name: Upload compiled program
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: emblem-bet-program
          path: target/deploy/emblem_bet.so
          retention-days: 30

  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            anchor-cli --tag v0.29.0 --locked

      - name: Restore deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOY_WALLET_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana balance

      - name: Build
        run: anchor build

      - name: Deploy to devnet
        run: anchor deploy --provider.cluster devnet

      - name: Print Program ID
        run: |
          echo "=== Deployed Program ID ==="
          solana program show --programs | grep emblem
